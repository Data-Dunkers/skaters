<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Skaters - Player Card Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body {
    font-family: 'Barlow', sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    color: #136399;
    text-transform: uppercase;
  }
  #status {
    font-size: 18px;
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
  }
  #cards-container {
    display: flex;
    flex-direction: column;
    gap: 40px;
    align-items: center;
    width: 100%;
  }
  .card-img {
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    border-radius: 12px;
    max-width: 100%;
    height: auto;
  }
  
  /* Hidden workspace for rendering */
  #render-workspace {
    position: absolute;
    left: -9999px;
    top: 0;
  }

  /* Target Card Layout (1200x800) */
  .card-scene {
    display: flex;
    gap: 30px;
    width: 1200px;
    height: 800px;
    padding: 30px;
    background: white;
    box-sizing: border-box;
  }

  /* Left Side */
  .card-left {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .ds-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 90px;
    font-weight: 800;
    font-style: italic;
    color: #136399;
    text-align: center;
    line-height: 1;
    margin-bottom: 10px;
    letter-spacing: -2px;
  }

  .photo-frame {
    flex: 1;
    border: 8px solid #136399;
    position: relative;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  .photo-img {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }

  .nickname-block {
    background: #136399;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    margin-top: 15px;
    line-height: 1;
    text-transform: uppercase;
  }

  .front-archetype {
    font-size: 40px;
    font-weight: 600;
    color: #e0f0ff;
  }

  /* Right Side */
  .card-right {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .stats-panel {
    border: 6px solid #136399;
    border-radius: 12px;
    overflow: hidden;
    background: white;
  }

  .stats-header {
    background: #136399;
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 60px;
    font-weight: 700;
    text-align: center;
    padding: 20px 0;
    line-height: 1;
  }

  .stats-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 34px;
    font-weight: 600;
  }

  .stats-table td {
    border: 4px solid #136399;
    padding: 6px 15px;
    color: #000;
  }

  .stats-table td:nth-child(2) {
    text-align: center;
    font-size: 40px;
    font-weight: 600;
  }

  .logos-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-top: auto;
    padding-bottom: 0px;
    transform: translateY(8px);
  }

  .logos-row img {
    height: 110px;
    object-fit: contain;
  }

</style>
</head>

<script>
const BASE_URL = "https://api.datadunkers.ca";

async function fetchAll(collection) {
    let results = [];
    let page = 1;
    while(true) {
        const res = await fetch(`${BASE_URL}/api/collections/${collection}/records?perPage=500&page=${page}`);
        if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
        const data = await res.json();
        results = results.concat(data.items || []);
        if(page >= data.totalPages) break;
        page++;
    }
    return results;
}

function calcZ(val, arr) {
    if (val === undefined || isNaN(val) || val === null) return 0;
    if (arr.length === 0) return 0;
    let sum = 0;
    for (let x of arr) sum += x;
    let mean = sum / arr.length;
    let sqSum = 0;
    for (let x of arr) sqSum += (x - mean)*(x - mean);
    let std = Math.sqrt(sqSum / arr.length);
    if (std === 0) return 0;
    return (val - mean) / std;
}

async function getImageDataUrl(url) {
    try {
        const response = await fetch(url);
        if (!response.ok) return null;
        const blob = await response.blob();
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    } catch {
        return null;
    }
}

async function renderCard(p, t, container) {
    const node = document.getElementById('card-template').cloneNode(true);
    node.id = '';
    
    node.querySelector('#tpl-nickname').textContent = p.nickname || 'UNKNOWN';
    node.querySelector('#tpl-front-archetype').textContent = t.computedArchetype || 'N/A';
    node.querySelector('#tpl-height').textContent = t.height_cm || 'N/A';
    node.querySelector('#tpl-wingspan').textContent = t.wingspan_cm || 'N/A';
    node.querySelector('#tpl-skate').textContent = t.skate_size || 'N/A';
    node.querySelector('#tpl-hand').textContent = t.handedness || 'N/A';
    node.querySelector('#tpl-month').textContent = t.birth_month || 'N/A';
    node.querySelector('#tpl-reaction').textContent = t.reaction_time_ms || 'N/A';
    node.querySelector('#tpl-hr').textContent = t.resting_heart_rate ? `${t.resting_heart_rate} bpm` : 'N/A';
    node.querySelector('#tpl-archetype').textContent = t.computedArchetype || 'N/A';

    let photoFilename = "";
    if (Array.isArray(p.photo) && p.photo.length > 0) {
        photoFilename = p.photo[0];
    } else if (typeof p.photo === 'string') {
        photoFilename = p.photo;
    }
    const photoUrl = photoFilename 
       ? `${BASE_URL}/api/files/data_skaters_photos/${p.id}/${photoFilename}`
       : null;

    const imgEl = node.querySelector('.photo-img');
    let imgData = null;
    if (photoUrl) {
        imgData = await getImageDataUrl(photoUrl);
    }
    // Use transparent pixel if no image loaded to prevent canvas hanging
    const finalImg = imgData || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
    imgEl.style.backgroundImage = `url("${finalImg}")`;

    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.alignItems = 'center';
    wrap.style.gap = '10px';
    wrap.style.marginBottom = '20px';
    
    wrap.appendChild(node);
    container.appendChild(wrap);

    // Yield control briefly to ensure DOM paints it properly
    await new Promise(r => setTimeout(r, 50));

    try {
        const canvas = await html2canvas(node, { scale: 1.5, backgroundColor: '#ffffff' });
        const dataUrl = canvas.toDataURL('image/png');
        
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = dataUrl;
        img.alt = `Player Card - ${p.nickname}`;
        
        const downloadLink = document.createElement('a');
        downloadLink.href = dataUrl;
        downloadLink.download = `${p.nickname}_card.png`;
        downloadLink.textContent = `Download ${p.nickname} Card`;
        downloadLink.style.fontFamily = "'Barlow Condensed', sans-serif";
        downloadLink.style.fontWeight = "bold";
        downloadLink.style.color = "#136399";
        downloadLink.style.textDecoration = "none";
        downloadLink.style.fontSize = "20px";
        
        // Swap out the actual DOM block for the generated Image File
        wrap.innerHTML = '';
        wrap.appendChild(img);
        wrap.appendChild(downloadLink);
    } catch (e) {
        console.error("Canvas error for", p.nickname, e);
        // Fallback: keep the DOM node visible if canvas fails
    }
}

// Compute archetypes for everyone
function computeArchetypes(traits, shots) {
    const shotData = {};
    for (let s of shots) {
        let nick = (s.nickname || "").toUpperCase();
        if (!nick) continue;
        if (!shotData[nick]) shotData[nick] = { d2:0, d5:0, d7:0, d10:0 };
        if (s.distance === 2) shotData[nick].d2 += (s.shots_made || 0);
        if (s.distance === 5) shotData[nick].d5 += (s.shots_made || 0);
        if (s.distance === 7) shotData[nick].d7 += (s.shots_made || 0);
        if (s.distance === 10) shotData[nick].d10 += (s.shots_made || 0);
    }

    const traitMap = {};
    traits.forEach(t => {
        if(t.nickname) traitMap[t.nickname.toUpperCase()] = t;
    });

    const allD2 = [], allD5 = [], allD7 = [], allD10 = [], allMinShots = [];
    const allHeight = [], allWing = [], allReact = [], allHR = [];

    Object.keys(traitMap).forEach(nick => {
       let t = traitMap[nick];
       if (typeof t.height_cm === 'number') allHeight.push(t.height_cm);
       if (typeof t.wingspan_cm === 'number') allWing.push(t.wingspan_cm);
       if (typeof t.reaction_time_ms === 'number') allReact.push(t.reaction_time_ms);
       if (typeof t.resting_heart_rate === 'number') allHR.push(t.resting_heart_rate);
       
       if (shotData[nick]) {
           allD2.push(shotData[nick].d2);
           allD5.push(shotData[nick].d5);
           allD7.push(shotData[nick].d7);
           allD10.push(shotData[nick].d10);
           allMinShots.push(Math.min(shotData[nick].d2, shotData[nick].d5, shotData[nick].d7, shotData[nick].d10));
       }
    });

    for (let nick of Object.keys(traitMap)) {
        let t = traitMap[nick];
        let s = shotData[nick] || { d2:0, d5:0, d7:0, d10:0 };
        
        let z10 = calcZ(s.d10, allD10);
        let z7 = calcZ(s.d7, allD7);
        let z5 = calcZ(s.d5, allD5);
        let z2 = calcZ(s.d2, allD2);
        let zMin = calcZ(Math.min(s.d2, s.d5, s.d7, s.d10), allMinShots);
        
        let zHeight = calcZ(t.height_cm, allHeight);
        let zWing = calcZ(t.wingspan_cm, allWing);
        let zReact = calcZ(t.reaction_time_ms, allReact);
        let zHR = calcZ(t.resting_heart_rate, allHR);

        let scores = {
            "Sniper": z10,
            "Speed Winger": z7 - zReact, // lower reaction time is better, minus is boost
            "Playmaker": zMin + zWing, // consistency (min score Z) + wingspan
            "Defenseman": z2 + zHeight,
            "Power Forward": z2 + z5 + zHeight + zWing,
            "Two-way Forward": z5 + z7 - zHR // lower HR is better fitness
        };

        let maxScore = -Infinity;
        let archetype = "Unknown";
        for (let k in scores) {
            if (scores[k] > maxScore) {
                maxScore = scores[k];
                archetype = k;
            }
        }
        t.computedArchetype = archetype;
    }
    
    return traitMap;
}

async function start() {
    try {
        document.getElementById('status').textContent = 'Fetching traits...';
        const traits = await fetchAll('data_skaters_traits');
        
        document.getElementById('status').textContent = 'Fetching photos...';
        const photos = await fetchAll('data_skaters_photos');
        
        document.getElementById('status').textContent = 'Fetching shots...';
        const shots = await fetchAll('data_skaters_shots');

        document.getElementById('status').textContent = 'Computing archetypes...';
        const traitMap = computeArchetypes(traits, shots);

        document.getElementById('status').textContent = `Generating ${photos.length} cards...`;
        const container = document.getElementById('cards-container');

        for (let i = 0; i < photos.length; i++) {
            const p = photos[i];
            if (!p.nickname) continue;
            
            document.getElementById('status').textContent = `Generating card ${i + 1} of ${photos.length} (${p.nickname})...`;
            
            const t = traitMap[p.nickname.toUpperCase()] || {};
            await renderCard(p, t, container);
        }
        
        document.getElementById('status').textContent = 'All cards generated successfully.';
        document.getElementById('render-workspace').style.display = 'none';
        
    } catch (err) {
        console.error(err);
        document.getElementById('status').textContent = 'Error: ' + err.message;
    }
}

// Ensure fonts and images are fully loaded before capturing
window.onload = () => {
    document.fonts.ready.then(() => {
        start();
    });
};
</script>
