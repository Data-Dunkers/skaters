<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Skaters - Collected Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6600;
            --primary-dim: rgba(255, 102, 0, 0.15);
            --bg-dark: #0076CE;
            --bg-card: #181818;
            --bg-input: #222222;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --border: #2a2a2a;
            --border-focus: #FF6600;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(255,102,0,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(255,102,0,0.04) 0%, transparent 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 3rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 1.4rem;
        }

        .page-header .eyebrow {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 0.4rem;
        }

        .page-header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1;
            color: var(--text-main);
        }

        .page-header h1 span { color: var(--primary); }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }

        .section-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 0.9rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        #progress-container {
            text-align: center;
            margin: 2rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        progress {
            width: 100%;
            max-width: 400px;
            height: 12px;
            border-radius: 6px;
            appearance: none;
            -webkit-appearance: none;
        }

        progress::-webkit-progress-bar {
            background-color: var(--bg-input);
            border-radius: 6px;
        }

        progress::-webkit-progress-value {
            background-color: var(--primary);
            border-radius: 6px;
            transition: width 0.2s ease;
        }

        .status-text {
            color: var(--text-muted);
            font-size: 0.96rem;
            font-weight: 500;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 2rem;
            display: none;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        th {
            font-family: 'Barlow Condensed', sans-serif;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 0.05em;
            background-color: rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.05);
        }

        select {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-family: 'Barlow', sans-serif;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }
        select:focus {
            border-color: var(--border-focus);
        }
        .filter-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        @media (max-width: 760px) {
            .page-header h1 { font-size: 2.25rem; }
            .card { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <a href="../index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; margin-bottom: 1rem; display: inline-block;">&larr; Back to Home</a>
        <div class="eyebrow">Data Skaters</div>
        <h1>Collected <span>Data</span></h1>
    </div>

    <div class="card">
        <div id="progress-container">
            <h2 class="section-label" style="border: none;">Downloading Data...</h2>
            <progress id="data-progress" value="0" max="100"></progress>
            <div id="status-text" class="status-text">Connecting to api.datadunkers.ca...</div>
        </div>

        <div id="tables-container">
            <div id="filter-container" class="filter-container" style="display: none;">
                <label for="date-select" class="status-text">Filter by Date:</label>
                <select id="date-select">
                    <option value="All Dates">All Dates</option>
                </select>
            </div>

            <div class="section-label" id="submission-label" style="display: none;">Data Submissions</div>
            <div class="table-container" id="submission-container" style="display: none;">
                <table id="submission-table">
                    <thead>
                        <!-- Headings injected by JS -->
                    </thead>
                    <tbody>
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://api.datadunkers.ca";
        let globalTraits = [];
        let globalPhotos = [];
        let globalShots = [];
        const COLLECTIONS = [
            { id: "data_skaters_traits", name: "Traits" },
            { id: "data_skaters_photos", name: "Photos" },
            { id: "data_skaters_shots", name: "Shots" }
        ];

        async function fetchAllRecords(collectionId, updateStatus) {
            const eventKey = localStorage.getItem('event_key');
            let records = [];
            let page = 1;
            const perPage = 500;
            
            while (true) {
                updateStatus(`Fetching ${collectionId} (page ${page})...`);
                const filterStr = eventKey ? `&filter=(event_key='${eventKey}')` : '';
                const response = await fetch(`${BASE_URL}/api/collections/${collectionId}/records?page=${page}&perPage=${perPage}${filterStr}`);
                if (!response.ok) {
                    throw new Error(`Failed to fetch ${collectionId}`);
                }
                const data = await response.json();
                
                const items = data.items || [];
                if (items.length === 0) {
                    break;
                }
                records.push(...items);
                
                if (page >= data.totalPages) {
                    break;
                }
                page++;
            }
            return records;
        }

        function renderAllTables(dateFilter = "All Dates") {
            const filterFn = rec => {
                if (dateFilter === "All Dates") return true;
                if (!rec.created) return true;
                return rec.created.split(" ")[0] === dateFilter;
            };

            const fTraits = globalTraits.filter(filterFn);
            const fPhotos = globalPhotos.filter(filterFn);
            const fShots = globalShots.filter(filterFn);

            const submissionContainer = document.getElementById('submission-container');
            const submissionLabel = document.getElementById('submission-label');
            const table = document.getElementById('submission-table');
            const thead = table.querySelector('thead');
            const tbody = table.querySelector('tbody');

            thead.innerHTML = '';
            tbody.innerHTML = '';

            if (fTraits.length === 0 && fPhotos.length === 0 && fShots.length === 0) {
                submissionContainer.style.display = 'none';
                submissionLabel.style.display = 'none';
                return;
            }

            // Get all unique distances
            const distances = new Set();
            globalShots.forEach(s => {
                if(s.distance) distances.add(String(s.distance).trim());
            });
            const sortedDistances = Array.from(distances).sort((a,b) => {
                const numA = parseFloat(a);
                const numB = parseFloat(b);
                if(!isNaN(numA) && !isNaN(numB)) return numA - numB;
                return a.localeCompare(b);
            });

            // Columns layout: Nickname | Group | Traits | Photo | [Distance 1] | [Distance 2] | ...
            const trHead = document.createElement('tr');
            trHead.innerHTML = `
                <th>Nickname</th>
                <th style="text-align:center;">Group</th>
                <th style="text-align:center;">Traits</th>
                <th style="text-align:center;">Photo</th>
            `;
            sortedDistances.forEach(d => {
                const th = document.createElement('th');
                th.style.textAlign = 'center';
                th.textContent = `Distance: ${d}`;
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);

            // Get all unique nicknames from filtered data
            const nicknames = new Set();
            fTraits.forEach(t => { if(t.nickname) nicknames.add(t.nickname.trim()); });
            fPhotos.forEach(p => { if(p.nickname) nicknames.add(p.nickname.trim()); });
            fShots.forEach(s => { if(s.nickname) nicknames.add(s.nickname.trim()); });

            const sortedNicknames = Array.from(nicknames).sort((a, b) => a.localeCompare(b, undefined, {sensitivity: 'base'}));

            // Populate rows
            sortedNicknames.forEach(nick => {
                const tr = document.createElement('tr');
                
                const tdNick = document.createElement('td');
                tdNick.textContent = nick;
                tdNick.style.fontWeight = '600';
                tr.appendChild(tdNick);

                let group = "-";
                const allUserRecords = [...fTraits, ...fPhotos, ...fShots].filter(r => r.nickname && r.nickname.trim().toLowerCase() === nick.toLowerCase());
                const recWithGroup = allUserRecords.find(r => r.group !== undefined && r.group !== null);
                if (recWithGroup) {
                    group = recWithGroup.group;
                }

                const tdGroup = document.createElement('td');
                tdGroup.style.textAlign = 'center';
                tdGroup.textContent = group;
                tr.appendChild(tdGroup);

                const hasTraits = fTraits.some(t => t.nickname && t.nickname.trim().toLowerCase() === nick.toLowerCase());
                const tdTraits = document.createElement('td');
                tdTraits.style.textAlign = 'center';
                tdTraits.innerHTML = hasTraits ? '<span style="color: #4ade80;">✔</span>' : '<span style="color: #f87171;">✘</span>';
                tr.appendChild(tdTraits);

                const hasPhoto = fPhotos.some(p => p.nickname && p.nickname.trim().toLowerCase() === nick.toLowerCase());
                const tdPhoto = document.createElement('td');
                tdPhoto.style.textAlign = 'center';
                tdPhoto.innerHTML = hasPhoto ? '<span style="color: #4ade80;">✔</span>' : '<span style="color: #f87171;">✘</span>';
                tr.appendChild(tdPhoto);

                sortedDistances.forEach(d => {
                    const hasShot = fShots.some(s => s.nickname && s.nickname.trim().toLowerCase() === nick.toLowerCase() && String(s.distance).trim() === d);
                    const tdShot = document.createElement('td');
                    tdShot.style.textAlign = 'center';
                    tdShot.innerHTML = hasShot ? '<span style="color: #4ade80;">✔</span>' : '<span style="color: #f87171;">✘</span>';
                    tr.appendChild(tdShot);
                });

                tbody.appendChild(tr);
            });

            submissionContainer.style.display = 'block';
            submissionLabel.style.display = 'block';

            makeTableSortable(table);
        }

        function makeTableSortable(table) {
            const headers = table.querySelectorAll('th');
            const tbody = table.querySelector('tbody');
            
            headers.forEach((header, index) => {
                header.style.cursor = 'pointer';
                header.style.userSelect = 'none';
                header.title = "Click to sort";
                
                header.addEventListener('click', () => {
                    const isAscending = header.classList.contains('sort-asc');
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    
                    // Clear all sort classes and indicators
                    headers.forEach(h => {
                        h.classList.remove('sort-asc', 'sort-desc');
                        h.textContent = h.textContent.replace(' ▲', '').replace(' ▼', '');
                    });
                    
                    let sortMultiplier = 1;
                    if (isAscending) {
                        header.classList.add('sort-desc');
                        header.textContent += ' ▼';
                        sortMultiplier = -1;
                    } else {
                        header.classList.add('sort-asc');
                        header.textContent += ' ▲';
                        sortMultiplier = 1;
                    }
                    
                    rows.sort((a, b) => {
                        const aText = a.children[index].textContent.trim();
                        const bText = b.children[index].textContent.trim();
                        
                        const aNum = parseFloat(aText);
                        const bNum = parseFloat(bText);
                        
                        let comparison = 0;
                        if (aText !== "" && bText !== "" && !isNaN(aNum) && !isNaN(bNum)) {
                            comparison = aNum - bNum;
                        } else {
                            comparison = aText.localeCompare(bText);
                        }
                        
                        return comparison * sortMultiplier;
                    });
                    
                    tbody.append(...rows);
                });
            });
        }
        function setupDateFilter() {
            const allRecords = [...globalTraits, ...globalPhotos, ...globalShots];
            const dates = new Set();
            allRecords.forEach(rec => {
                if (rec.created) {
                    dates.add(rec.created.split(" ")[0]);
                }
            });
            
            const sortedDates = Array.from(dates).sort().reverse();
            const select = document.getElementById("date-select");
            
            sortedDates.forEach(date => {
                const option = document.createElement("option");
                option.value = date;
                option.textContent = date;
                select.appendChild(option);
            });
            
            document.getElementById("filter-container").style.display = "flex";
            
            select.addEventListener("change", (e) => {
                renderAllTables(e.target.value);
            });
        }

        async function downloadAll() {
            const statusText = document.getElementById("status-text");
            const progressBar = document.getElementById("data-progress");
            const progressContainer = document.getElementById("progress-container");

            let currentProgress = 0;
            const progressPerCollection = 100 / COLLECTIONS.length;

            try {
                // Fetch Traits
                globalTraits = await fetchAllRecords(COLLECTIONS[0].id, (status) => {
                    statusText.textContent = status;
                });
                currentProgress += progressPerCollection;
                progressBar.value = currentProgress;

                // Fetch Photos/Names
                globalPhotos = await fetchAllRecords(COLLECTIONS[1].id, (status) => {
                    statusText.textContent = status;
                });
                currentProgress += progressPerCollection;
                progressBar.value = currentProgress;

                // Fetch Shots
                globalShots = await fetchAllRecords(COLLECTIONS[2].id, (status) => {
                    statusText.textContent = status;
                });
                currentProgress += progressPerCollection;
                progressBar.value = currentProgress;

                // Done
                statusText.textContent = "Data successfully loaded!";
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    setupDateFilter();
                    renderAllTables("All Dates");
                }, 500);

            } catch (error) {
                console.error(error);
                statusText.textContent = "Error downloading data. Check console.";
                statusText.style.color = "red";
            }
        }

        // Start automatically
        window.addEventListener("DOMContentLoaded", () => {
            const eventKey = localStorage.getItem('event_key');
            if (!eventKey) {
                window.location.href = '../index.html';
                return;
            }
            downloadAll();
        });
    </script>
</body>
</html>
