<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Skaters Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #FF6600;
            --primary-dim: rgba(255, 102, 0, 0.15);
            --bg-dark: #0076CE;
            --bg-card: #181818;
            --bg-input: #222222;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --border: #2a2a2a;
            --border-focus: #FF6600;
            --success: #22C55E;
            --success-dim: rgba(34, 197, 94, 0.15);
            --error: #EF4444;
            --error-dim: rgba(239, 68, 68, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(255,102,0,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(255,102,0,0.04) 0%, transparent 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem;
        }

        /* ── HEADER ── */
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .page-header .eyebrow {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 0.4rem;
        }
        .page-header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1;
            color: var(--text-main);
        }
        .page-header h1 span { color: var(--primary); }
        .page-header p {
            margin-top: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ── CARD ── */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* ── SECTION LABELS ── */
        .section-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        /* ── FORM GROUPS ── */
        .form-section { margin-bottom: 1.75rem; }

        .form-row {
            display: grid;
            gap: 1rem;
        }
        .form-row.cols-2 { grid-template-columns: 1fr 1fr; }

        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

        label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 11px 14px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Barlow', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }
        #nickname.nickname-reminder {
            background-color: rgba(255, 102, 0, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.14);
        }
        input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(255,102,0,0.12);
        }

        /* ── OPTION BUTTON GROUP ── */
        .option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .option-btn {
            flex: 1;
            min-width: 2.75rem;
            padding: 10px 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-muted);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .option-btn:hover { border-color: #555; color: #fff; }
        .option-btn.active {
            background: var(--primary-dim);
            border-color: var(--primary);
            color: var(--primary);
        }



        /* ── SUBMIT ── */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── STATUS ── */
        #statusMessage {
            margin-top: 1rem;
            text-align: center;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
        }
        .status-success { background: var(--success-dim); color: var(--success); border: 1px solid var(--success); }
        .status-error   { background: var(--error-dim);   color: var(--error);   border: 1px solid var(--error);   }

        /* ── HISTORY TABLE ── */
        .history-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .history-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .history-header h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--primary);
        }
        #statsFor { font-size: 0.82rem; color: var(--text-muted); }

        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        th {
            text-align: left;
            color: var(--primary);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
        }
        td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: var(--text-main); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--primary-dim); }
        #emptyState { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 1.5rem 0; }

        .progress-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            margin-top: 1rem;
        }
        .progress-help {
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 0.8rem;
        }
        .progress-hit {
            color: var(--success);
            font-weight: 700;
            text-align: center;
            font-size: 1.05rem;
        }
        .progress-miss {
            color: var(--text-muted);
            text-align: center;
            font-size: 1.05rem;
        }

        .home-link-wrap {
            margin-top: 1rem;
        }
        .home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s, transform 0.1s;
        }
        .home-link:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .home-link:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        .active-nickname {
            margin-bottom: 1.25rem;
            text-align: center;
        }
        .active-nickname .label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }
        .active-nickname .value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(2rem, 7vw, 3.1rem);
            font-weight: 800;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--primary);
            line-height: 1;
        }

        textarea {
            width: 100%;
            min-height: 110px;
            padding: 11px 14px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Barlow', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(255,102,0,0.12);
        }
    </style>
</head>
<body>

<div class="page-header">
    <div class="eyebrow">Data Science × Hockey</div>
    <h1>Data <span>Skaters</span></h1>
</div>

<!-- ── FORM CARD ── -->
<div class="card" style="margin-bottom: 1.5rem;">

    <div id="setupSection">
        <div class="form-section">
            <div class="form-row">
                <div class="form-group">
                    <label for="group">Group #</label>
                    <input type="number" id="group" name="group" placeholder="e.g. 3" min="1" required>
                </div>
                <div class="form-group">
                    <label for="nicknamesInput">Nicknames</label>
                    <textarea id="nicknamesInput" name="nicknamesInput" placeholder="e.g. PS43, AB12&#10;XY7 ZZ10" oninput="sanitizeNicknamesInput(this)"></textarea>
                </div>
            </div>
        </div>

        <button type="button" class="submit-btn" id="startBtn" onclick="startNicknamesFlow()">Submit Nicknames</button>
    </div>

    <div id="logSection" class="hidden">
        <div class="active-nickname">
            <div class="label">Now Logging</div>
            <div class="value" id="activeNickname">—</div>
        </div>

        <div class="form-section">
            <div class="section-label">Distance</div>
            <div class="form-group">
                <label>Select Distance</label>
                <div class="option-group" id="distanceOptions">
                    <button type="button" class="option-btn" onclick="selectOption('distance', 2, this)">2 ft</button>
                    <button type="button" class="option-btn" onclick="selectOption('distance', 5, this)">5 ft</button>
                    <button type="button" class="option-btn" onclick="selectOption('distance', 7, this)">7 ft</button>
                    <button type="button" class="option-btn" onclick="selectOption('distance', 10, this)">10 ft</button>
                </div>
                <input type="hidden" id="distance" name="distance">
            </div>
        </div>

        <div class="form-section">
            <div class="section-label">Shots Made</div>
            <div class="form-group">
                <label>Out of 6</label>
                <div class="option-group" id="shotsOptions">
                    <button type="button" class="option-btn" onclick="selectOption('shots_made', 0, this)">0</button>
                    <button type="button" class="option-btn" onclick="selectOption('shots_made', 1, this)">1</button>
                    <button type="button" class="option-btn" onclick="selectOption('shots_made', 2, this)">2</button>
                    <button type="button" class="option-btn" onclick="selectOption('shots_made', 3, this)">3</button>
                    <button type="button" class="option-btn" onclick="selectOption('shots_made', 4, this)">4</button>
                    <button type="button" class="option-btn" onclick="selectOption('shots_made', 5, this)">5</button>
                    <button type="button" class="option-btn" onclick="selectOption('shots_made', 6, this)">6</button>
                </div>
                <input type="hidden" id="shots_made" name="shots_made">
            </div>
        </div>

        <button type="button" class="submit-btn" id="submitBtn" onclick="handleSubmit()">Log Data</button>
    </div>
    <div id="statusMessage"></div>
</div>

<div class="progress-card hidden" id="progressCard">
    <div class="history-header">
        <h2>Group Progress</h2>
        <span id="progressGroupLabel">—</span>
    </div>
    <div class="progress-help">Shows whether each nickname has at least one log at each distance.</div>
    <div id="progressEmpty" style="display:none;" class="progress-help">No logs yet for this group.</div>
    <table id="progressTable" style="display:none;">
        <thead>
            <tr>
                <th>Nickname</th>
                <th>2 ft</th>
                <th>5 ft</th>
                <th>7 ft</th>
                <th>10 ft</th>
            </tr>
        </thead>
        <tbody id="progressBody"></tbody>
    </table>
</div>

<!-- ── HISTORY CARD ── -->
<div class="history-card hidden" id="historyCard">
    <div class="history-header">
        <h2>Shot History</h2>
        <span id="statsFor">—</span>
    </div>
    <div id="emptyState">No shots logged yet.</div>
    <table id="statsTable" style="display:none;">
        <thead>
            <tr>
                <th>Distance</th>
                <th>Shots Made</th>
            </tr>
        </thead>
        <tbody id="statsBody"></tbody>
    </table>
</div>

<div class="home-link-wrap"><a class="home-link" href="../index.html">Home</a></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const PB_URL = 'https://api.datadunkers.ca/api/collections/data_skaters_shots/records';
let nicknameQueue = [];
let nicknameIndex = 0;
let activeGroup = '';

// ── ON LOAD ─────────────────────────────────────────────────────
window.onload = () => {
    const eventKey = localStorage.getItem('event_key');
    if (!eventKey) {
        window.location.href = '../index.html';
        return;
    }

    document.getElementById('setupSection').classList.remove('hidden');
    document.getElementById('logSection').classList.add('hidden');
    document.getElementById('historyCard').classList.add('hidden');
    document.getElementById('progressCard').classList.add('hidden');
};

function sanitizeNicknamesInput(el) {
    // Keep all-uppercase and remove spaces immediately after letters.
    el.value = el.value.toUpperCase().replace(/([A-Z])\s+/g, '$1');
}

function extractNicknames(raw) {
    const normalized = raw
        .toUpperCase()
        .replace(/([A-Z])\s+/g, '$1')
        .replace(/[\r\n,]+/g, ' ')
        .trim();

    if (!normalized) return [];

    return normalized
        .split(/\s+/)
        .map(n => n.trim())
        .filter(Boolean);
}

function startNicknamesFlow() {
    const groupValue = document.getElementById('group').value.trim();
    const nicknamesRaw = document.getElementById('nicknamesInput').value;
    const extracted = extractNicknames(nicknamesRaw);

    if (!groupValue || extracted.length === 0) {
        showStatus('Enter a group number and at least one nickname.', 'error');
        return;
    }

    activeGroup = groupValue;
    nicknameQueue = extracted;
    nicknameIndex = 0;

    document.getElementById('setupSection').classList.add('hidden');
    document.getElementById('logSection').classList.remove('hidden');
    document.getElementById('historyCard').classList.remove('hidden');
    document.getElementById('progressCard').classList.remove('hidden');

    updateActiveNicknameDisplay();
    updateProgressIndicator();
}

function updateActiveNicknameDisplay() {
    const currentNickname = nicknameQueue[nicknameIndex] || '';
    document.getElementById('activeNickname').textContent = currentNickname || '—';
    if (currentNickname) updateStats(currentNickname);
}

function advanceNickname() {
    if (nicknameQueue.length === 0) return;
    nicknameIndex = (nicknameIndex + 1) % nicknameQueue.length;
    updateActiveNicknameDisplay();
}

function clearShotInputs() {
    document.getElementById('distance').value = '';
    document.getElementById('shots_made').value = '';
    document.querySelectorAll('#distanceOptions .option-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('#shotsOptions .option-btn').forEach(b => b.classList.remove('active'));
}


// ── OPTION BUTTON SELECTION ────────────────────────────────────
function selectOption(fieldId, value, btn) {
    document.getElementById(fieldId).value = value;
    btn.closest('.option-group').querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// ── SUBMIT ───────────────────────────────────────────────────────
async function handleSubmit() {
    const group    = activeGroup;
    const nick     = nicknameQueue[nicknameIndex] || '';
    const distance = document.getElementById('distance').value;
    const shots_made  = document.getElementById('shots_made').value;
    
    if (!group || !nick || !distance || shots_made === '') {
        showStatus('Please fill in all required fields.', 'error'); return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Logging data…';

    const payload = {
        group:          parseInt(group, 10),
        nickname:       nick,
        distance:       parseInt(distance, 10),
        shots_made:     parseInt(shots_made, 10),
        event_key:      localStorage.getItem('event_key'),
    };

    try {
        const res = await fetch(PB_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);

        showStatus('Data logged! ✓', 'success');
        clearShotInputs();
        updateProgressIndicator();
        advanceNickname();

    } catch (err) {
        showStatus(`Error: ${err.message}`, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Log Data';
    }
}

// ── STATUS MESSAGE ───────────────────────────────────────────────
function showStatus(msg, type) {
    const el = document.getElementById('statusMessage');
    el.textContent = msg;
    el.className = type === 'success' ? 'status-success' : 'status-error';
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
}

// ── HISTORY TABLE ────────────────────────────────────────────────
async function updateStats(nick) {
    document.getElementById('statsFor').textContent = nick;
    try {
        const key = localStorage.getItem('event_key');
        const res  = await fetch(`${PB_URL}?filter=(nickname='${nick}'&&group=${activeGroup}&&event_key='${key}')&sort=-created&perPage=50`);
        const data = await res.json();
        const tbody = document.getElementById('statsBody');
        const table = document.getElementById('statsTable');
        const empty = document.getElementById('emptyState');

        tbody.innerHTML = '';

        if (!data.items || data.items.length === 0) {
            table.style.display = 'none';
            empty.style.display = 'block';
            return;
        }

        table.style.display = 'table';
        empty.style.display = 'none';

        data.items.forEach((r) => {
            tbody.innerHTML += `<tr>
                <td>${r.distance}</td>
                <td>${r.shots_made}</td>
            </tr>`;
        });
    } catch (err) {
        console.error('Stats fetch failed:', err);
    }
}

async function updateProgressIndicator() {
    const progressGroupLabel = document.getElementById('progressGroupLabel');
    const progressTable = document.getElementById('progressTable');
    const progressBody = document.getElementById('progressBody');
    const progressEmpty = document.getElementById('progressEmpty');
    const distances = [2, 5, 7, 10];

    progressGroupLabel.textContent = activeGroup ? `Group ${activeGroup}` : '—';

    if (!activeGroup || nicknameQueue.length === 0) {
        progressTable.style.display = 'none';
        progressEmpty.style.display = 'block';
        progressBody.innerHTML = '';
        return;
    }

    try {
        const key = localStorage.getItem('event_key');
        const res = await fetch(`${PB_URL}?filter=(group=${activeGroup}&&event_key='${key}')&perPage=500`);
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];

        const loggedByNick = new Map();
        nicknameQueue.forEach(n => loggedByNick.set(n, new Set()));

        items.forEach((record) => {
            const nick = String(record.nickname || '').toUpperCase().trim();
            const distance = parseInt(record.distance, 10);
            if (loggedByNick.has(nick) && distances.includes(distance)) {
                loggedByNick.get(nick).add(distance);
            }
        });

        progressBody.innerHTML = nicknameQueue.map((nick) => {
            const set = loggedByNick.get(nick) || new Set();
            return `<tr>
                <td>${nick}</td>
                <td class="${set.has(2) ? 'progress-hit' : 'progress-miss'}">${set.has(2) ? '✓' : '·'}</td>
                <td class="${set.has(5) ? 'progress-hit' : 'progress-miss'}">${set.has(5) ? '✓' : '·'}</td>
                <td class="${set.has(7) ? 'progress-hit' : 'progress-miss'}">${set.has(7) ? '✓' : '·'}</td>
                <td class="${set.has(10) ? 'progress-hit' : 'progress-miss'}">${set.has(10) ? '✓' : '·'}</td>
            </tr>`;
        }).join('');

        const hasAnyLogs = items.length > 0;
        progressTable.style.display = 'table';
        progressEmpty.style.display = hasAnyLogs ? 'none' : 'block';
    } catch (err) {
        progressTable.style.display = 'none';
        progressEmpty.style.display = 'block';
        console.error('Progress fetch failed:', err);
    }
}
</script>
</body>
</html>
